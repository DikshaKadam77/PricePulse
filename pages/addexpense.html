<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense
    </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/addexpense.css">

</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <h2 class="logo">PricePulse</h2>
        <ul class="menu">
            <li>
                    <a href="dashboard.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>
                <li class="active"> 
                    <a href="addexpense.html">
                        <i class="fa-solid fa-plus"></i>
                        Add Expense
                    </a>
                </li>
                <li>
                    <a href="transactions.html">
                        <i class="fa-solid fa-receipt"></i>
                        Transactions
                    </a>
                </li>
                <li>
                    <a href="analytics.html">
                        <i class="fa-solid fa-chart-line"></i>
                        Analytics
                    </a>
                </li>

                <div class="sidebar-bottom">
                <div class="profile-card">
                    <div class="avatar" id="avatar">D</div>
                    <div>
                        <h4 id="profileName">Loading...</h4>
                        <p id="profileEmail">loading@email.com</p>
                    </div>
                </div>

                <button type="button" id="logoutBtn" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>
            </div>
        </ul>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h1>Add Expense</h1>
            <p>Track every expense to stay within your monthly budget.</p>
        </div>
        <a href="dashboard.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Home
        </a>
    <!-- form -->
    <div class="expense-card">
        <form id="expenseForm">
            <!-- Title -->
            <div class="input-group">
                <label>Expense Title</label>
                <input
                    type="text"
                    id="title"
                    placeholder="e.g Food, Uber, Netflix"
                    required
                    >
            </div>
            <!-- Amount -->
            <div class="input-group">
                <label>Amount</label>
                <input
                    type="number"
                    id="amount"
                    placeholder="Enter Amount"
                    required
                    >
            </div>
            <div class="input-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="">Choose Category</option>
                    <option value="Food">Food</option>

                        <option value="Shopping">Shopping</option>

                        <option value="Travel">Travel</option>

                        <option value="Entertainment">Entertainment</option>

                        <option value="Education">Education</option>

                        <option value="Health">Health</option>

                        <option value="Bills"> Bills</option>

                        <option value="Other">Other</option>

                </select>
            </div>
            <!-- Date -->
            <div class="input-group">
                <label>Date</label>
                <input
                    type="date"
                    id="date"
                    required
                >
            </div>
            <!-- Notes -->
            <div class="input-group">
                <label>Notes (Optional)</label>
                <textarea
                    id="notes"
                    rows="5"
                    placeholder="Add extra information...."
                ></textarea>
            </div>
                <button type="submit" class="save-btn" id="saveExpenseBtn">
                    <i class="fa-solid fa-floopy-disk"></i>
                    Save Expense
                </button>
        </form>
    </div>
    </main>
</div>
<script type="module" src="../js/addexpense.js"></script>
</body>
</html>
